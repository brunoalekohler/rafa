<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bruno & Rafaelly ❤️</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, sans-serif;
      background:black;
      color:white;
      overflow:hidden;
    }

    /* INTRO */

    #intro{
      position:fixed;
      inset:0;
      background:linear-gradient(135deg,#1a001f,#000);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      z-index:9999;
      padding:20px;
    }

    #intro h1{
      font-size:3rem;
      margin-bottom:15px;
    }

    #enterBtn{
      margin-top:20px;
      padding:15px 40px;
      border:none;
      border-radius:50px;
      cursor:pointer;
      font-size:1.1rem;
      font-weight:bold;
    }

    /* FUNDO */

    .video-bg{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      z-index:-2;
    }

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.5);
      z-index:-1;
    }

    /* CONTEÚDO */

    .container{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    .card{
      background:rgba(255,255,255,0.08);
      padding:30px;
      border-radius:20px;
      max-width:700px;
    }

    #contador{
      font-size:1.4rem;
      margin-top:20px;
    }

  </style>
</head>

<body>

  <!-- INTRO -->
  <div id="intro">

    <h1>Bruno & Rafaelly ❤️</h1>

    <p>Clique para entrar no nosso mundo</p>

    <button id="enterBtn">Entrar ❤️</button>

  </div>

  <!-- YOUTUBE -->
  <iframe
    id="yt"
    class="video-bg"
    width="100%"
    height="100%"
    src="https://www.youtube.com/embed/KFp3PHmchks?enablejsapi=1&autoplay=0&mute=1&controls=0&loop=1&playlist=KFp3PHmchks"
    frameborder="0"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>

  <div class="overlay"></div>

  <!-- CONTEÚDO -->
  <div class="container">

    <div class="card">

      <h1>Bruno & Rafaelly ❤️</h1>

      <p>Desde 14/05/2026 ✨</p>

      <div id="contador"></div>

    </div>

  </div>

  <script>

    // CONTADOR
    function atualizar(){

      const inicio = new Date('2026-05-14T00:00:00');
      const agora = new Date();

      const diff = agora - inicio;

      const dias = Math.floor(diff / (1000*60*60*24));

      document.getElementById("contador").innerHTML =
      dias + " dias juntos ❤️";
    }

    setInterval(atualizar,1000);
    atualizar();

    // BOTÃO ENTRAR
    document.getElementById("enterBtn").addEventListener("click", () => {

      // mostra site
      document.getElementById("intro").style.display = "none";

      // ativa som do YouTube (DESMUTA via URL não funciona direto)
      const iframe = document.getElementById("yt");

      iframe.src =
      "https://www.youtube.com/embed/KFp3PHmchks?autoplay=1&mute=0&enablejsapi=1&controls=0&loop=1&playlist=KFp3PHmchks";

    });

  </script>

</body>

</html>
